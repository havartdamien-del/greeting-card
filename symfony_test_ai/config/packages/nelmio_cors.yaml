nelmio_cors:
  defaults:
    origin_regex: '%env(CORS_ALLOW_ORIGIN)%'
    allow_credentials: false
    max_age: 3600
  paths:
    '^/api':
      allow_origin: ['*']
      allow_headers: ['*']
      allow_methods: ['GET', 'POST', 'PUT', 'DELETE', 'PATCH', 'OPTIONS']
      expose_headers: ['Link']
      max_age: 3600
