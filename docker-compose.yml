version: '3.9'

services:
  # Service MySQL Database
  mysql:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    image: greeting-card-mysql-v1.0.0
    container_name: greeting-card-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-greeting_card}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - ./docker/mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    restart: unless-stopped
    networks:
      - greeting-card-network
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65535

  # Service Backend Symfony + API Platform
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: greeting-card-php-v1.0.0
    container_name: greeting-card-php-dev
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://${DB_USER:-user}:${DB_PASSWORD:-password}@mysql:3306/${DB_DATABASE:-greeting_card}?serverVersion=8.0
      - APP_ENV=${APP_ENV:-dev}
      - APP_DEBUG=${APP_DEBUG:-1}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:-^https?://localhost(:[0-9]+)?$}
    volumes:
      - ./symfony:/app
    ports:
      - "9000:9000"
    restart: unless-stopped
    networks:
      - greeting-card-network
    command: >
      sh -c "
        php-fpm
      "

  # Service Nginx Reverse Proxy for API
  nginx-api:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: greeting-card-nginx-api-v1.0.0
    container_name: greeting-card-nginx-api-dev
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./symfony:/app
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/php-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - greeting-card-network

  # Service Nginx + Frontend Angular
  angular:
    build:
      context: .
      dockerfile: docker/angular/Dockerfile
    image: greeting-card-angular-v1.0.0
    container_name: greeting-card-angular-dev
    depends_on:
      - php
      - nginx-api
    ports:
      - "4200:4200"
    volumes:
      - ./angular:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - greeting-card-network
    environment:
      - NODE_ENV=development

volumes:
  mysql_data:
    driver: local

networks:
  greeting-card-network:
    driver: bridge
