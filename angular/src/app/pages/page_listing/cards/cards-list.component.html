@if (isEmpty$ | async) {
  <div class="empty-state">
    <p>Aucune card trouvée</p>
  </div>
}

@if (!(isEmpty$ | async)) {
  <div class="cards-grid">
    @for (card of cards$ | async; track card) {
      <div
        class="card-item"
        (click)="viewCardDetail(card.id!)"
        (keyup.enter)="viewCardDetail(card.id!)"
        tabindex="card.id"
      >
        <div class="card-image">
          @if (card.picture) {
            <img [src]="getSrcImage(card.picture)" [alt]="card.title" />
          }
        </div>
        <div class="card-body">
          <h3>{{ card.title }}</h3>
          <p>{{ card.description }}</p>
          @if (card.tags && card.tags.length > 0) {
            <div class="card-tags">
              @for (tag of card.tags; track tag) {
                <span class="tag">{{ tag.name }}</span>
              }
            </div>
          }
        </div>
      </div>
    }
  </div>
}
