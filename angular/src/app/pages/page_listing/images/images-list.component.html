<div *ngIf="(isEmpty$ | async)" class="empty-state">
  <p>Aucune image trouvée</p>
</div>

<div *ngIf="!(isEmpty$ | async)" class="images-grid">
  <div *ngFor="let image of (images$ | async)" class="image-item" (click)="onImageClick(image.id!)" (keyup.enter)="onImageClick(image.id!)" tabindex="0">
    <div class="image-wrapper">
      <img [src]="image.type === 'url' ? image.value : 'http://localhost:8080' + image.value" [alt]="image.type" />
    </div>
  </div>
</div>
