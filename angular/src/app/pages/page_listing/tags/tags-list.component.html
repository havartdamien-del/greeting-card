@if (isEmpty$ | async) {
  <div class="empty-state">
    <p>Aucun tag trouvé</p>
  </div>
}

@if (!(isEmpty$ | async)) {
  <div class="tags-grid">
    @for (tag of tags$ | async; track tag) {
      <div
        class="tag-item"
        (click)="onTagClick(tag.id!)"
        (keyup.enter)="onTagClick(tag.id!)"
        tabindex="tag.id"
      >
        <div class="tag-content">
          <h3>{{ tag.name }}</h3>
        </div>
      </div>
    }
  </div>
}
