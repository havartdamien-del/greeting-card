<div *ngIf="(isEmpty$ | async)" class="empty-state">
  <p>Aucun tag trouvé</p>
</div>

<div *ngIf="!(isEmpty$ | async)" class="tags-grid">
  <div *ngFor="let tag of (tags$ | async)" class="tag-item" (click)="onTagClick(tag.id!)" (keyup.enter)="onTagClick(tag.id!)" tabindex="0">
    <div class="tag-content">
      <h3>{{ tag.name }}</h3>
    </div>
  </div>
</div>
