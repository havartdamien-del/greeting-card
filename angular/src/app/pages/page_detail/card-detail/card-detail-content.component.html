<!-- Image -->
@if (card?.picture) {
  <div class="card-image-section">
    <img [src]="getSrcImage(card?.picture)" [alt]="card?.title" class="card-image" />
  </div>
}

<!-- Details -->
<div class="card-details-section">
  <!-- Description -->
  @if (card?.description) {
    <div class="detail-block">
      <h2 class="detail-title">Description</h2>
      <p class="detail-text">{{ card?.description }}</p>
    </div>
  }

  <!-- Tags -->
  @if (card?.tags?.length) {
    <div class="detail-block">
      <h2 class="detail-title">Tags</h2>
      <div class="tags-container">
        @for (tag of card?.tags; track tag) {
          <span class="tag-badge">{{ tag?.name }}</span>
        }
      </div>
    </div>
  }

  <!-- Picture type info -->
  @if (card?.picture) {
    <div class="detail-block">
      <h2 class="detail-title">Type d'image</h2>
      <p class="detail-text">{{ card?.picture?.type }}</p>
    </div>
  }
</div>
