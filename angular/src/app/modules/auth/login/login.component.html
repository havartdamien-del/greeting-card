<div class="login-container">
  <div class="login-card">
    <h1 class="login-title">Connexion</h1>

    <!-- Message d'erreur -->
    <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
      {{ errorMessage }}
      <button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
    </div>

    <!-- Formulaire de connexion -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Champ Email -->
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          id="email"
          formControlName="email"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          placeholder="Entrez votre email"
          [disabled]="isLoading"
        />
        <div class="invalid-feedback" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <span *ngIf="loginForm.get('email')?.errors?.['required']">L'email est requis</span>
          <span *ngIf="loginForm.get('email')?.errors?.['email']">L'email est invalide</span>
        </div>
      </div>

      <!-- Champ Mot de passe -->
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input
          type="password"
          class="form-control"
          id="password"
          formControlName="password"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          placeholder="Entrez votre mot de passe"
          [disabled]="isLoading"
        />
        <div class="invalid-feedback" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">Le mot de passe est requis</span>
        </div>
      </div>

      <!-- Bouton de soumission -->
      <button
        type="submit"
        class="btn btn-primary w-100 mb-3"
        [disabled]="isFormInvalid"
      >
        <span *ngIf="!isLoading">Se connecter</span>
        <span *ngIf="isLoading">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Connexion en cours...
        </span>
      </button>
    </form>

    <!-- Lien de démonstration -->
    <div class="text-muted text-center mt-4">
      <p class="small">Credentials de test:</p>
      <p class="small">Email: <code>admin@test.com</code></p>
      <p class="small">Password: <code>password</code></p>
    </div>
  </div>
</div>
