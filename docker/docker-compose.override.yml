# Docker Compose Override for Development
# This file is automatically loaded by docker-compose
# Provides development-specific configuration

services:
  # Service MySQL Database (Development)
  mysql:
    container_name: greeting-card-mysql-dev
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - greeting-card-network-dev

  # Service Backend Symfony + API Platform (Development)
  php:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    container_name: greeting-card-php-dev
    image: greeting-card-php-dev-v1.0.0
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - APP_DEBUG=${APP_DEBUG:-1}
      - APP_SECRET=${APP_SECRET:-dev-secret-key}
      # - DATABASE_URL=mysql://${DB_USER:-user}:${DB_PASSWORD:-password}@mysql:3306/${DB_DATABASE:-greeting_card}?serverVersion=8.0
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:-^https?://localhost(:[0-9]+)?$}
    ports:
      - "${PHP_PORT:-9000}:9000"
    # volumes:
    #   - ./php/php.ini:/usr/local/etc/php/conf.d/app.ini:ro
    #   - ./php/php-fpm.conf:/usr/local/etc/php-fpm.conf:ro
    networks:
      - greeting-card-network-dev

  # Service Nginx Reverse Proxy for API (Development)
  nginx-api:
    container_name: greeting-card-nginx-api-dev
    image: greeting-card-dev-nginx-api-v1.0.0
    ports:
      - "${NGINX_API_PORT:-8080}:80"
    volumes:
      - ../symfony:/app
    networks:
      - greeting-card-network-dev

  # Service Nginx + Frontend Angular (Development)
  angular:
    build:
      context: ..
      dockerfile: docker/angular/Dockerfile
      target: development
    container_name: greeting-card-angular-dev
    image: greeting-card-angular-dev-v1.0.0
    ports:
      - "${ANGULAR_PORT:-4200}:4200"
    volumes:
      - ../angular:/app
      - /app/node_modules
    networks:
      - greeting-card-network-dev
    environment:
      - NG_HOST=0.0.0.0
      - NG_PORT=4200

  # Service phpMyAdmin (Development only)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: greeting-card-phpmyadmin-dev
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-greeting_card_user}
      PMA_PASSWORD: ${DB_PASSWORD:-greeting_card_password}
      PMA_DB: ${DB_DATABASE:-greeting_card}
      PMA_PORT: 3306
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    networks:
      - greeting-card-network-dev
    depends_on:
      - mysql
    restart: unless-stopped

networks:
  greeting-card-network-dev:
    driver: bridge
