# Docker Compose Override for Development
# This file is automatically loaded by docker-compose
# Provides development-specific configuration

services:
  # Service MySQL Database (Development)
  mysql:
    container_name: greeting-card-mysql-dev
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - greeting-card-network-dev

  # Service Backend Symfony + API Platform (Development)
  php:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    container_name: greeting-card-php-dev
    image: greeting-card-php-dev-v1.0.0
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - APP_DEBUG=${APP_DEBUG:-1}
      - APP_SECRET=${APP_SECRET:-dev-secret-key}
    ports:
      - "${PHP_PORT:-9000}:9000"
    volumes:
      - ./php/php.ini:/usr/local/etc/php/conf.d/app.ini:ro
      - ./php/php-fpm.conf:/usr/local/etc/php-fpm.conf:ro
    networks:
      - greeting-card-network-dev

  # Service Nginx Reverse Proxy for API (Development)
  nginx-api:
    container_name: greeting-card-nginx-api-dev
    image: greeting-card-dev-nginx-api-v1.0.0
    ports:
      - "${NGINX_API_PORT:-8080}:80"
    volumes:
      - ../symfony:/app
    networks:
      - greeting-card-network-dev

  # Service Nginx + Frontend Angular (Development)
  angular:
    build:
      context: ..
      dockerfile: docker/angular/Dockerfile
      target: development
    container_name: greeting-card-angular-dev
    image: greeting-card-angular-dev-v1.0.0
    ports:
      - "${ANGULAR_PORT:-4200}:4200"
    volumes:
      - ../angular:/app
      - /app/node_modules
    networks:
      - greeting-card-network-dev
    environment:
      - NG_HOST=0.0.0.0
      - NG_PORT=4200

networks:
  greeting-card-network-dev:
    driver: bridge
