# Docker Compose Override for Development
# This file is automatically loaded by docker-compose
# Provides development-specific configuration

services:
  # Service MySQL Database (Development)
  mysql:
    container_name: greeting-card-mysql-test

  # Service Backend Symfony + API Platform (Development)
  php:
    build:
      target: dev
    container_name: greeting-card-php-test
    image: greeting-card-php-test-v1.0.0
    environment:
      APP_ENV: test
      APP_DEBUG: 1
    ports:
      - "${PHP_PORT:-9000}:9000"
    volumes:
      - ../symfony:/app
      - vendor:/app/vendor

  # Service Nginx Reverse Proxy for API (Development)
  nginx-api:
    container_name: greeting-card-nginx-api-test
    image: greeting-card-test-nginx-api-v1.0.0
    volumes:
      - ../symfony:/app

  # Service Nginx + Frontend Angular (Development)
  angular:
    build:
      target: dev
    container_name: greeting-card-angular-test
    image: greeting-card-angular-test-v1.0.0
    ports:
      - "${ANGULAR_PORT:-4200}:4200"
    volumes:
      - ../angular:/app
      - /app/node_modules
    command: sh -c "npx ng serve --host 0.0.0.0 --poll 2000"
